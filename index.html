<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tanima Jewels - Shipping Label Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #f1c40f; padding-bottom: 10px; margin-top: 0; }
        .bulk-section { background: #fff9e6; padding: 15px; border-radius: 8px; border: 1px dashed #f1c40f; margin-bottom: 20px; }
        .bulk-section textarea { width: 100%; height: 80px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: inherit; margin-bottom: 10px; }
        .btn-split { background: #f39c12; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        
        .form-group { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .field-container { display: flex; flex-direction: column; }
        .field-container label { font-size: 12px; font-weight: bold; color: #555; margin-bottom: 5px; margin-left: 2px; }
        .full-width { grid-column: span 2; }
        
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #f1c40f; outline: none; }
        
        /* --- SALES MODULE CSS --- */
        .sales-module { grid-column: span 2; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #eee; margin-top: 10px; }
        .item-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; align-items: flex-end; }
        .item-row label { font-size: 10px; color: #888; }
        .ship-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; border-top: 1px solid #ddd; padding-top: 10px; margin-top: 10px; }
        .btn-reset-sales { background: #e74c3c; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }

        .btn-group { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { flex: 1; padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; min-width: 120px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add { background: #2c3e50; color: white; }
        .btn-sync { background: #3498db; color: white; }
        .btn-print { background: #f1c40f; color: #2c3e50; }
        .btn-reset { background: #9b59b6; color: white; }
        .btn-export { background: #27ae60; color: white; }
        .btn-clear { background: #e74c3c; color: white; }
        
        .history-section { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
        .search-box { margin-bottom: 15px; background: #eef2f7; padding: 15px; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
        .search-box input { flex: 1; border: 2px solid #3498db; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; font-size: 11px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .status-select { padding: 4px; font-size: 10px; color: white; border: none; border-radius: 4px; width: 80px; }
        .tracking-input { padding: 4px; font-size: 10px; border: 1px solid #ccc; width: 100px; }
        
        #print-area { display: grid; grid-template-columns: 1fr 1fr; width: 210mm; margin-top: 30px; }
        .label { border: 1px solid #000; padding: 12px; height: 68mm; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; background: white; page-break-inside: avoid; overflow: hidden; position: relative; }
        .label-btns { position: absolute; top: 5px; right: 5px; display: flex; gap: 4px; z-index: 10; }
        .label-btns button { border: none; border-radius: 4px; width: 26px; height: 26px; font-size: 9px; cursor: pointer; font-weight: bold; color: white; padding: 0; min-width: 26px; }
        .l-edit { background: #f1c40f; color: #2c3e50 !important; }
        .l-copy { background: #3498db; }
        .l-del { background: #e74c3c; }

        .to-section { display: flex; justify-content: space-between; align-items: flex-start; font-size: 11pt; line-height: 1.3; color: #000; }
        .address-text { flex: 1; padding-right: 10px; }
        .logo-container { width: 150px; height: 150px; display: flex; justify-content: center; align-items: center; }
        .logo-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .bold-data { font-weight: bold; font-size: 13pt; text-transform: uppercase; }
        .from-section { font-size: 10.5pt; border-top: 1px dashed #000; padding-top: 8px; margin-top: 2px; color: #1a1a1a; line-height: 1.3; }
        #label-counter { margin-top: 15px; font-weight: bold; color: #7f8c8d; text-align: center; }
        @media print { .container, .history-section, .label-btns, .search-box, #label-counter, #syncStatus { display: none !important; } body { padding: 0; background: white; } #print-area { margin: 0; display: grid !important; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Tanima Jewels Address label Portal</h2>
    <div class="bulk-section">
        <strong>1. Paste Scrambled Address:</strong>
        <textarea id="bulkPaste" placeholder="Paste address..."></textarea>
        <button class="btn-split" onclick="splitAddress()">✨ Auto-Fill & Capitalize</button>
    </div>
    
    <strong>2. Shipping & Sales Details:</strong>
    <div class="form-group">
        <div class="field-container full-width">
            <label>Customer Name</label>
            <input type="text" id="custName" onblur="this.value = toTitleCase(this.value)">
        </div>
        <div class="field-container">
            <label>House Name / No.</label>
            <input type="text" id="house" onblur="this.value = toTitleCase(this.value)">
        </div>
        <div class="field-container">
            <label>Post Office / Area</label>
            <input type="text" id="po" onblur="this.value = toTitleCase(this.value)">
        </div>
        <div class="field-container">
            <label>Location / Landmark</label>
            <input type="text" id="location" onblur="this.value = toTitleCase(this.value)">
        </div>
        <div class="field-container">
            <label>District</label>
            <input type="text" id="district" onblur="this.value = toTitleCase(this.value)">
        </div>
        <div class="field-container">
            <label>State</label>
            <input type="text" id="state" onblur="this.value = toTitleCase(this.value)">
        </div>
        <div class="field-container">
            <label>Pincode</label>
            <input type="text" id="pincode">
        </div>
        <div class="field-container full-width">
            <label>Mobile Number</label>
            <input type="text" id="phone">
        </div>

        <div class="sales-module">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <strong>Items & Profit Tracking</strong>
                <div style="display: flex; gap: 8px;">
                    <button type="button" class="btn-reset-sales" onclick="resetSalesModule()">Reset Items</button>
                    <select id="itemCount" style="width:120px; padding:5px;" onchange="renderItemRows()">
                        <option value="0">0 Items</option>
                        <option value="1">1 Item</option>
                        <option value="2">2 Items</option>
                        <option value="3">3 Items</option>
                        <option value="4">4 Items</option>
                        <option value="5">5 Items</option>
                        <option value="6">6 Items</option>
                        <option value="7">7 Item</option>
                        <option value="8">8 Items</option>
                        <option value="9">9 Items</option>
                        <option value="10">10 Items</option>
                    </select>
                </div>
            </div>
            <div id="itemRowsContainer"></div>
            <div class="ship-row" id="shippingDataRow" style="display:none;">
                <div class="field-container"><label>Ship. Collected</label><input type="number" id="shipColl" placeholder="0" oninput="calcTotalProfit()"></div>
                <div class="field-container"><label>Ship. Paid</label><input type="number" id="shipPaid" placeholder="0" oninput="calcTotalProfit()"></div>
                <div class="field-container">
                    <label>Summary</label>
                    <div style="font-size: 11px; color: #666;">Gross: <span id="grossTotalBox" style="font-weight:bold; color:#34495e;">₹ 0</span></div>
                    <div style="font-size: 11px; color: #666;">Profit: <span id="totalProfitBox" style="font-weight:bold; color:#27ae60;">₹ 0</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button id="mainBtn" class="btn-add" onclick="processLabel()">📥 <span id="btnText">Add & Save Local</span></button>
        <button class="btn-sync" onclick="syncAllToCloud()">☁️ Sync All to Cloud</button>
        <button class="btn-print" onclick="window.print()">🖨️ Print Labels</button>
        <button class="btn-reset" onclick="resetQueue()">🔄 Reset Queue</button>
        <button class="btn-export" onclick="exportToCSV()">📊 Export CSV</button>
        <button class="btn-clear" onclick="clearAllData()">⚠️ Wipe Data</button>
    </div>

    <div id="syncStatus" style="text-align:center; margin-top:10px; font-size:14px; font-weight:bold; color:#7f8c8d;">
        Status: <span id="statusText">⚪ Ready</span>
    </div>

    <div id="label-counter">Labels in Queue: 0 / 8</div>

    <div class="history-section">
        <h3>Customer Database & Tracking</h3>
        <div class="search-box">
            🔍 <input type="text" id="searchInput" placeholder="Search by Name or Mobile..." onkeyup="renderHistory()">
            <span id="dataCount" style="font-size:12px; color: #666;"></span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Date</th><th>Name</th><th>Mobile</th><th>District</th><th>Tracking #</th><th>Status</th><th>Action</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<div id="print-area"></div>

<script>
    let customers = JSON.parse(localStorage.getItem('tanima_customers')) || [];
    let count = 0;
    let editId = null;
    const LOGO_URL = "qr.png"; 
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxqbCFSIKCYh0JGyVuw50z_bCHo0Cm3G0LGdNOOFVJGdvMzpHUE80GP9Qzh3Z4uFsTO/exec";

    window.onload = renderHistory;

    function toTitleCase(str) {
        if (!str) return "";
        return str.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
    }

    // --- SALES FUNCTIONS ---
    function renderItemRows() {
        const num = document.getElementById('itemCount').value;
        const container = document.getElementById('itemRowsContainer');
        const shipRow = document.getElementById('shippingDataRow');
        
        // 1. SNAPSHOT EXISTING DATA
        const savedData = [];
        const existingNames = document.querySelectorAll('.i-name');
        const existingSales = document.querySelectorAll('.i-sales');
        const existingCosts = document.querySelectorAll('.i-cost');
        
        existingNames.forEach((el, i) => {
            savedData.push({
                name: el.value,
                sale: existingSales[i].value,
                cost: existingCosts[i].value
            });
        });

        // 2. REBUILD CONTAINER
        container.innerHTML = '';
        if(num > 0) {
            shipRow.style.display = 'grid';
            for(let i=1; i<=num; i++) {
                const old = savedData[i-1] || { name: '', sale: '', cost: '' };
                container.innerHTML += `
                <div class="item-row">
                    <div><label>Item ${i} Name</label><input type="text" class="i-name" placeholder="Item Name" value="${old.name}"></div>
                    <div><label>Sales Price</label><input type="number" class="i-sales" placeholder="0" oninput="calcTotalProfit()" value="${old.sale}"></div>
                    <div><label>Cost Price</label><input type="number" class="i-cost" placeholder="0" oninput="calcTotalProfit()" value="${old.cost}"></div>
                    <div style="text-align:center;"><label>Profit</label><div class="i-profit" style="font-weight:bold; color:#27ae60;">0</div></div>
                </div>`;
            }
            calcTotalProfit();
        } else { shipRow.style.display = 'none'; }
    }

    function resetSalesModule() {
        if(confirm("Clear all items and price values?")) {
            document.getElementById('itemCount').value = "0";
            document.getElementById('itemRowsContainer').innerHTML = '';
            document.getElementById('shippingDataRow').style.display = 'none';
            document.getElementById('shipColl').value = '';
            document.getElementById('shipPaid').value = '';
            document.getElementById('totalProfitBox').innerText = '₹ 0';
            document.getElementById('grossTotalBox').innerText = '₹ 0';
        }
    }

    function calcTotalProfit() {
        let totalProfit = 0;
        let grossSales = 0;
        const sales = document.querySelectorAll('.i-sales');
        const costs = document.querySelectorAll('.i-cost');
        const profits = document.querySelectorAll('.i-profit');
        
        sales.forEach((s, i) => {
            const saleVal = parseFloat(s.value) || 0;
            const costVal = parseFloat(costs[i].value) || 0;
            const p = saleVal - costVal;
            profits[i].innerText = p;
            totalProfit += p;
            grossSales += saleVal;
        });
        
        const shipColl = parseFloat(document.getElementById('shipColl').value) || 0;
        const shipPaid = parseFloat(document.getElementById('shipPaid').value) || 0;
        totalProfit += (shipColl - shipPaid);
        grossSales += shipColl;
        
        document.getElementById('totalProfitBox').innerText = '₹ ' + totalProfit;
        document.getElementById('grossTotalBox').innerText = '₹ ' + grossSales;
    }

    function getItemsData() {
        const items = [];
        const names = document.querySelectorAll('.i-name');
        const sales = document.querySelectorAll('.i-sales');
        const costs = document.querySelectorAll('.i-cost');
        names.forEach((n, i) => {
            if(n.value) {
                items.push({
                    itemName: n.value,
                    sale: parseFloat(sales[i].value) || 0,
                    cost: parseFloat(costs[i].value) || 0
                });
            }
        });
        return items;
    }

    function updateStatus(mode, current = 0, total = 0) {
        const el = document.getElementById('statusText');
        if (mode === 'syncing') { el.innerHTML = `🟡 Syncing (${current}/${total})...`; el.style.color = "#f39c12"; }
        else if (mode === 'success') { el.innerHTML = "🟢 All Synced"; el.style.color = "#27ae60"; setTimeout(()=>updateStatus('ready'), 3000); }
        else if (mode === 'error') { el.innerHTML = "🔴 Sync Error"; el.style.color = "#e74c3c"; }
        else { el.innerHTML = "⚪ Ready"; el.style.color = "#7f8c8d"; }
    }

    function splitAddress() {
        const raw = document.getElementById('bulkPaste').value;
        const phoneMatch = raw.match(/\b\d{10}\b/);
        if (phoneMatch) document.getElementById('phone').value = phoneMatch[0];
        const pinMatch = raw.match(/\b\d{6}\b/);
        if (pinMatch) document.getElementById('pincode').value = pinMatch[0];
        let cleanText = raw;
        if (phoneMatch) cleanText = cleanText.replace(phoneMatch[0], "");
        if (pinMatch) cleanText = cleanText.replace(pinMatch[0], "");
        cleanText = cleanText.replace(/contact|pin|mob|mobile|address|ph|phone|[:\-]/gi, "");
        const parts = cleanText.split(/[\n,]+/).map(item => item.trim()).filter(item => item !== "");
        if(parts[0]) document.getElementById('custName').value = toTitleCase(parts[0]);
        if(parts[1]) document.getElementById('house').value = toTitleCase(parts[1]);
        if(parts[2]) document.getElementById('po').value = toTitleCase(parts[2]);
        if(parts[3]) document.getElementById('location').value = toTitleCase(parts[3]);
        if(parts[4]) document.getElementById('district').value = toTitleCase(parts[4]);
        if(parts[5]) document.getElementById('state').value = toTitleCase(parts[5]);
    }

    function processLabel() {
        const name = document.getElementById('custName').value;
        const pin = document.getElementById('pincode').value;
        if(!name || !pin) { alert("Please enter Name and Pincode"); return; }

        const salesData = {
            items: getItemsData(),
            shipColl: parseFloat(document.getElementById('shipColl').value) || 0,
            shipPaid: parseFloat(document.getElementById('shipPaid').value) || 0
        };

        if (editId) {
            const index = customers.findIndex(c => c.id === editId);
            if (index !== -1) {
                customers[index] = { ...customers[index], name, house: document.getElementById('house').value, po: document.getElementById('po').value, loc: document.getElementById('location').value, dist: document.getElementById('district').value, state: document.getElementById('state').value, pin, ph: document.getElementById('phone').value, sales: salesData };
                const currentQueueIds = Array.from(document.querySelectorAll('.label')).map(el => parseInt(el.getAttribute('data-id')));
                document.getElementById('print-area').innerHTML = '';
                customers.forEach(c => { if (currentQueueIds.includes(c.id)) addLabelToPrintArea(c); });
            }
            editId = null;
            document.getElementById('btnText').innerText = "Add & Save Local";
            document.getElementById('mainBtn').style.background = "#2c3e50";
        } else {
            const now = new Date();
            const DD = String(now.getDate()).padStart(2, '0');
            const MM = String(now.getMonth() + 1).padStart(2, '0');
            const YY = String(now.getFullYear()).slice(-2);
            
            const datePart = DD + MM + YY;
            const fullTimestamp = Date.now().toString();
            const shortID = fullTimestamp.slice(-6); 
            
            const formattedOrderID = `TJ-${datePart}-${shortID}`;
            const uniqueKey = Date.now();

            const newCust = { 
                id: uniqueKey, 
                orderID: formattedOrderID, 
                date: now.toLocaleDateString(), 
                name, 
                house: document.getElementById('house').value, 
                po: document.getElementById('po').value, 
                loc: document.getElementById('location').value, 
                dist: document.getElementById('district').value, 
                state: document.getElementById('state').value, 
                pin, 
                ph: document.getElementById('phone').value, 
                tracking: '', 
                status: 'Pending', 
                sales: salesData 
            };
            customers.push(newCust);
            addLabelToPrintArea(newCust);
        }
        saveToStorage();
        renderHistory();
        clearInputs();
    }

    async function syncAllToCloud() {
        if (customers.length === 0) { alert("Database is empty!"); return; }
        if (!confirm(`Sync all ${customers.length} records to cloud?`)) return;
        const total = customers.length;
        for (let i = 0; i < total; i++) {
            updateStatus('syncing', i + 1, total);
            try {
                const payload = {...customers[i]};
                await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({...payload, type: "LABEL"}), mode: "no-cors" });
                if(customers[i].sales && customers[i].sales.items.length > 0) {
                    await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({...payload, type: "SALES"}), mode: "no-cors" });
                }
            } catch (e) { 
                updateStatus('error'); 
                alert(`Error syncing record ${i+1}.`);
                return;
            }
        }
        updateStatus('success');
        alert("All records synced successfully!");
    }

    function addLabelToPrintArea(data) {
        const area = document.getElementById('print-area');
        const div = document.createElement('div');
        div.className = 'label';
        div.setAttribute('data-id', data.id);
        div.innerHTML = `
            <div class="label-btns">
                <button class="l-edit" onclick="editLabel(this.parentElement.parentElement)">Edit</button>
                <button class="l-copy" onclick="copyLabel(this.parentElement.parentElement)">C</button>
                <button class="l-del" onclick="removeLabel(this.parentElement.parentElement)">X</button>
            </div>
            <div class="to-section">
                <div class="address-text">
                    <strong>To,</strong><br>
                    <span class="bold-data">${data.name}</span><br>
                    ${data.house}${data.house ? ',' : ''} ${data.po}<br>
                    ${data.loc}${data.loc ? ',' : ''} ${data.dist}<br>
                    ${data.state} - <strong>PIN: ${data.pin}</strong><br>
                    <strong>Mob: ${data.ph}</strong>
                </div>
                <div class="logo-container"><img src="${LOGO_URL}" alt="Logo"></div>
            </div>
            <div class="from-section">
                <strong>From,</strong><br>
                <strong>SAIVANDANA KB</strong>, Kattany House, PO Kanjany,<br>
                Thrissur, Kerala - <strong>680612</strong>. MOB: <strong>9846797894</strong>
            </div>`;
        area.appendChild(div);
        count = document.querySelectorAll('.label').length;
        updateCounter();
    }

    function editLabel(el) {
        const id = parseInt(el.getAttribute('data-id'));
        const record = customers.find(c => c.id === id);
        if (record) {
            document.getElementById('custName').value = record.name;
            document.getElementById('house').value = record.house;
            document.getElementById('po').value = record.po;
            document.getElementById('location').value = record.loc;
            document.getElementById('district').value = record.dist;
            document.getElementById('state').value = record.state;
            document.getElementById('pincode').value = record.pin;
            document.getElementById('phone').value = record.ph;
            
            if(record.sales && record.sales.items.length > 0) {
                document.getElementById('itemCount').value = record.sales.items.length;
                renderItemRows();
                const names = document.querySelectorAll('.i-name');
                const sales = document.querySelectorAll('.i-sales');
                const costs = document.querySelectorAll('.i-cost');
                record.sales.items.forEach((it, i) => {
                    names[i].value = it.itemName;
                    sales[i].value = it.sale;
                    costs[i].value = it.cost;
                });
                document.getElementById('shipColl').value = record.sales.shipColl;
                document.getElementById('shipPaid').value = record.sales.shipPaid;
                calcTotalProfit();
            }

            editId = id;
            document.getElementById('btnText').innerText = "Update Local";
            document.getElementById('mainBtn').style.background = "#f39c12";
            window.scrollTo(0,0);
        }
    }

    function copyLabel(el) {
        const id = parseInt(el.getAttribute('data-id'));
        const record = customers.find(c => c.id === id);
        if (record) {
            const now = new Date();
            const DD = String(now.getDate()).padStart(2, '0');
            const MM = String(now.getMonth() + 1).padStart(2, '0');
            const YY = String(now.getFullYear()).slice(-2);
            
            const datePart = DD + MM + YY;
            const fullTS = Date.now().toString();
            const shortID = fullTS.slice(-6);
            
            const formattedOrderID = `TJ-${datePart}-${shortID}`;
            const uniqueKey = Date.now();

            const newData = {...record, id: uniqueKey, orderID: formattedOrderID};
            customers.push(newData);
            addLabelToPrintArea(newData);
            saveToStorage();
        }
    }

    function readdToQueue(id) {
        const record = customers.find(c => c.id === id);
        if (record) { addLabelToPrintArea(record); window.scrollTo(0, document.body.scrollHeight); }
    }

    function removeLabel(el) { el.remove(); count = document.querySelectorAll('.label').length; updateCounter(); }
    function resetQueue() { if(confirm("Clear print queue?")) { document.getElementById('print-area').innerHTML = ''; count=0; updateCounter(); } }

    function renderHistory() {
        const body = document.getElementById('historyBody');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        body.innerHTML = '';
        const filtered = customers.filter(c => c.name.toLowerCase().includes(searchTerm) || c.ph.includes(searchTerm));
        document.getElementById('dataCount').innerText = `Total: ${customers.length}`;
        filtered.slice().reverse().forEach((c) => {
            const masterIndex = customers.findIndex(item => item.id === c.id);
            body.innerHTML += `
                <tr>
                    <td>${c.date}</td>
                    <td><strong>${c.name}</strong><br><small style="color:#888">${c.orderID}</small></td>
                    <td>${c.ph}</td>
                    <td>${c.dist}</td>
                    <td><input type="text" class="tracking-input" value="${c.tracking}" onchange="updateRecord(${masterIndex}, 'tracking', this.value)"></td>
                    <td>
                        <select class="status-select" onchange="updateRecord(${masterIndex}, 'status', this.value)" style="background: ${getStatusColor(c.status)};">
                            <option ${c.status=='Pending'?'selected':''}>Pending</option>
                            <option ${c.status=='Shipped'?'selected':''}>Shipped</option>
                            <option ${c.status=='Delivered'?'selected':''}>Delivered</option>
                        </select>
                    </td>
                    <td style="display:flex; gap:5px;">
                        <button style="background:#3498db; color:white; padding:4px 8px; border:none; border-radius:4px; cursor:pointer;" onclick="readdToQueue(${c.id})">Queue</button>
                        <button style="background:#e74c3c; color:white; padding:4px 8px; border:none; border-radius:4px; cursor:pointer;" onclick="deleteFromMaster(${masterIndex})">Delete</button>
                    </td>
                </tr>`;
        });
    }

    function getStatusColor(status) { return status === 'Shipped' ? '#3498db' : (status === 'Delivered' ? '#27ae60' : '#f39c12'); }
    function updateRecord(idx, field, value) { customers[idx][field] = value; saveToStorage(); renderHistory(); }
    function deleteFromMaster(idx) { if(confirm("Delete from local?")) { customers.splice(idx, 1); saveToStorage(); renderHistory(); } }
    function saveToStorage() { localStorage.setItem('tanima_customers', JSON.stringify(customers)); }
    function clearInputs() { 
        ['custName', 'house', 'po', 'location', 'district', 'state', 'pincode', 'phone', 'bulkPaste', 'itemCount', 'shipColl', 'shipPaid'].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.value = id === 'itemCount' ? '0' : '';
        });
        document.getElementById('itemRowsContainer').innerHTML = '';
        document.getElementById('shippingDataRow').style.display = 'none';
        document.getElementById('totalProfitBox').innerText = '₹ 0';
        document.getElementById('grossTotalBox').innerText = '₹ 0';
    }
    function updateCounter() { document.getElementById('label-counter').innerText = `Labels in Queue: ${count} / 8`; }
    function clearAllData() { if(confirm("Wipe local data?")) { localStorage.clear(); customers = []; document.getElementById('print-area').innerHTML = ''; count=0; renderHistory(); updateCounter(); } }

    function exportToCSV() {
        if(customers.length === 0) return;
        let csv = "OrderID,Date,Name,House,PO,Loc,District,State,Pin,Phone,Tracking,Status\n";
        customers.forEach(c => { csv += `"${c.orderID}","${c.date}","${c.name}","${c.house}","${c.po}","${c.loc}","${c.dist}","${c.state}","${c.pin}","${c.ph}","${c.tracking}","${c.status}"\n`; });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a'); a.href = window.URL.createObjectURL(blob); a.download = 'Tanima_Backup.csv'; a.click();
    }
</script>
</body>
</html>
