<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tanima Jewels - Shipping Label Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #f1c40f; padding-bottom: 10px; margin-top: 0; }
        .bulk-section { background: #fff9e6; padding: 15px; border-radius: 8px; border: 1px dashed #f1c40f; margin-bottom: 20px; }
        .bulk-section textarea { width: 100%; height: 80px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: inherit; margin-bottom: 10px; }
        .btn-split { background: #f39c12; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        
        .form-group { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .field-container { display: flex; flex-direction: column; }
        .field-container label { font-size: 12px; font-weight: bold; color: #555; margin-bottom: 5px; margin-left: 2px; }
        .full-width { grid-column: span 2; }
        
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #f1c40f; outline: none; }
        
        .btn-group { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        button { flex: 1; padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; min-width: 120px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add { background: #2c3e50; color: white; }
        .btn-sync { background: #3498db; color: white; }
        .btn-print { background: #f1c40f; color: #2c3e50; }
        .btn-reset { background: #9b59b6; color: white; }
        .btn-export { background: #27ae60; color: white; }
        .btn-clear { background: #e74c3c; color: white; }
        
        .history-section { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
        .search-box { margin-bottom: 15px; background: #eef2f7; padding: 15px; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
        .search-box input { flex: 1; border: 2px solid #3498db; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .status-select { padding: 4px; font-size: 11px; color: white; border: none; border-radius: 4px; }
        .tracking-input { padding: 4px; font-size: 11px; border: 1px solid #ccc; width: 120px; }
        
        #print-area { display: grid; grid-template-columns: 1fr 1fr; width: 210mm; margin-top: 30px; }
        .label { border: 1px solid #000; padding: 12px; height: 68mm; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; background: white; page-break-inside: avoid; overflow: hidden; position: relative; }
        .label-btns { position: absolute; top: 5px; right: 5px; display: flex; gap: 4px; z-index: 10; }
        .label-btns button { border: none; border-radius: 4px; width: 26px; height: 26px; font-size: 9px; cursor: pointer; font-weight: bold; color: white; padding: 0; min-width: 26px; }
        .l-edit { background: #f1c40f; color: #2c3e50 !important; }
        .l-copy { background: #3498db; }
        .l-del { background: #e74c3c; }

        /* FIXED LOGO ALIGNMENT */
        .to-section { display: flex; justify-content: space-between; align-items: flex-start; font-size: 11pt; line-height: 1.3; color: #000; }
        .address-text { flex: 1; padding-right: 10px; }
        .logo-container { width: 150px; height: 150px; display: flex; justify-content: center; align-items: center; }
        .logo-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .to-section strong:first-child { font-size: 13pt; } 
        .from-section { font-size: 10.5pt; border-top: 1px dashed #000; padding-top: 8px; margin-top: 2px; color: #1a1a1a; line-height: 1.3; }
        .from-section strong:first-child { font-size: 11.5pt; }
        .bold-data { font-weight: bold; font-size: 13pt; text-transform: uppercase; }
        #label-counter { margin-top: 15px; font-weight: bold; color: #7f8c8d; text-align: center; }
        @media print { .container, .history-section, .label-btns, .search-box, #label-counter, #syncStatus { display: none !important; } body { padding: 0; background: white; } #print-area { margin: 0; display: grid !important; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Tanima Jewels Cloud Portal</h2>
    <div class="bulk-section">
        <strong>1. Paste Scrambled Address:</strong>
        <textarea id="bulkPaste" placeholder="Paste address..."></textarea>
        <button class="btn-split" onclick="splitAddress()">✨ Auto-Fill & Capitalize</button>
    </div>
    
    <strong>2. Shipping Details:</strong>
    <div class="form-group">
        <div class="field-container full-width">
            <label>Customer Name</label>
            <input type="text" id="custName" onblur="this.value = toTitleCase(this.value)">
        </div>
        <div class="field-container">
            <label>House Name / No.</label>
            <input type="text" id="house" onblur="this.value = toTitleCase(this.value)">
        </div>
        <div class="field-container">
            <label>Post Office / Area</label>
            <input type="text" id="po" onblur="this.value = toTitleCase(this.value)">
        </div>
        <div class="field-container">
            <label>Location / Landmark</label>
            <input type="text" id="location" onblur="this.value = toTitleCase(this.value)">
        </div>
        <div class="field-container">
            <label>District</label>
            <input type="text" id="district" onblur="this.value = toTitleCase(this.value)">
        </div>
        <div class="field-container">
            <label>State</label>
            <input type="text" id="state" onblur="this.value = toTitleCase(this.value)">
        </div>
        <div class="field-container">
            <label>Pincode</label>
            <input type="text" id="pincode">
        </div>
        <div class="field-container full-width">
            <label>Mobile Number</label>
            <input type="text" id="phone">
        </div>
    </div>

    <div class="btn-group">
        <button id="mainBtn" class="btn-add" onclick="processLabel()">📥 <span id="btnText">Add & Save Local</span></button>
        <button class="btn-sync" onclick="syncCurrentToCloud()">☁️ Sync to Cloud</button>
        <button class="btn-print" onclick="window.print()">🖨️ Print Labels</button>
        <button class="btn-reset" onclick="resetQueue()">🔄 Reset Queue</button>
        <button class="btn-export" onclick="exportToCSV()">📊 Export CSV</button>
        <button class="btn-clear" onclick="clearAllData()">⚠️ Wipe Data</button>
    </div>

    <div id="syncStatus" style="text-align:center; margin-top:10px; font-size:14px; font-weight:bold; color:#7f8c8d;">
        Status: <span id="statusText">⚪ Ready</span>
    </div>

    <div id="label-counter">Labels in Queue: 0 / 8</div>

    <div class="history-section">
        <h3>Customer Database & Tracking</h3>
        <div class="search-box">
            🔍 <input type="text" id="searchInput" placeholder="Search by Name or Mobile..." onkeyup="renderHistory()">
            <span id="dataCount" style="font-size:12px; color: #666;"></span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Date</th><th>Name</th><th>Mobile</th><th>Tracking #</th><th>Status</th><th>Action</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<div id="print-area"></div>

<script>
    let customers = JSON.parse(localStorage.getItem('tanima_customers')) || [];
    let lastProcessedData = null; 
    let count = 0;
    let editId = null;

    // Working sample logo (Jewelry icon)
    const LOGO_URL = "qr.png"; 

    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxEp2usutMByPWSKk19nRtC5cH3-6L6DkySddk5x12imDkIQoiCeBX3FH-XVGqqMjvFBA/exec";

    window.onload = renderHistory;

    function toTitleCase(str) {
        if (!str) return "";
        return str.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
    }

    function updateStatus(mode) {
        const el = document.getElementById('statusText');
        if (mode === 'syncing') { el.innerHTML = "🟡 Syncing..."; el.style.color = "#f39c12"; }
        else if (mode === 'success') { el.innerHTML = "🟢 Cloud Synced"; el.style.color = "#27ae60"; setTimeout(()=>updateStatus('ready'), 3000); }
        else if (mode === 'error') { el.innerHTML = "🔴 Sync Error"; el.style.color = "#e74c3c"; }
        else { el.innerHTML = "⚪ Ready"; el.style.color = "#7f8c8d"; }
    }

    function splitAddress() {
        const raw = document.getElementById('bulkPaste').value;
        const phoneMatch = raw.match(/\b\d{10}\b/);
        if (phoneMatch) document.getElementById('phone').value = phoneMatch[0];
        const pinMatch = raw.match(/\b\d{6}\b/);
        if (pinMatch) document.getElementById('pincode').value = pinMatch[0];

        let cleanText = raw;
        if (phoneMatch) cleanText = cleanText.replace(phoneMatch[0], "");
        if (pinMatch) cleanText = cleanText.replace(pinMatch[0], "");
        cleanText = cleanText.replace(/contact|pin|mob|mobile|address|ph|phone|[:\-]/gi, "");

        const parts = cleanText.split(/[\n,]+/).map(item => item.trim()).filter(item => item !== "");
        
        if(parts[0]) document.getElementById('custName').value = toTitleCase(parts[0]);
        if(parts[1]) document.getElementById('house').value = toTitleCase(parts[1]);
        if(parts[2]) document.getElementById('po').value = toTitleCase(parts[2]);
        if(parts[3]) document.getElementById('location').value = toTitleCase(parts[3]);
        if(parts[4]) document.getElementById('district').value = toTitleCase(parts[4]);
        if(parts[5]) document.getElementById('state').value = toTitleCase(parts[5]);
    }

    function processLabel() {
        const name = document.getElementById('custName').value;
        const pin = document.getElementById('pincode').value;
        if(!name || !pin) { alert("Please enter Name and Pincode"); return; }

        if (editId) {
            const index = customers.findIndex(c => c.id === editId);
            if (index !== -1) {
                customers[index] = { ...customers[index], name, house: document.getElementById('house').value, po: document.getElementById('po').value, loc: document.getElementById('location').value, dist: document.getElementById('district').value, state: document.getElementById('state').value, pin, ph: document.getElementById('phone').value };
                lastProcessedData = customers[index];
                
                const currentQueueIds = Array.from(document.querySelectorAll('.label')).map(el => parseInt(el.getAttribute('data-id')));
                document.getElementById('print-area').innerHTML = '';
                customers.forEach(c => {
                    if (currentQueueIds.includes(c.id)) addLabelToPrintArea(c);
                });
            }
            editId = null;
            document.getElementById('btnText').innerText = "Add & Save Local";
            document.getElementById('mainBtn').style.background = "#2c3e50";
        } else {
            lastProcessedData = { id: Date.now(), date: new Date().toLocaleDateString(), name, house: document.getElementById('house').value, po: document.getElementById('po').value, loc: document.getElementById('location').value, dist: document.getElementById('district').value, state: document.getElementById('state').value, pin, ph: document.getElementById('phone').value, tracking: '', status: 'Pending' };
            customers.push(lastProcessedData);
            addLabelToPrintArea(lastProcessedData);
        }

        saveToStorage();
        renderHistory();
        clearInputs();
    }

    async function syncCurrentToCloud() {
        if (!lastProcessedData) { alert("Add a label first!"); return; }
        updateStatus('syncing');
        try {
            await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(lastProcessedData), mode: "no-cors" });
            updateStatus('success');
        } catch (e) { updateStatus('error'); }
    }

    function addLabelToPrintArea(data) {
        const area = document.getElementById('print-area');
        const div = document.createElement('div');
        div.className = 'label';
        div.setAttribute('data-id', data.id);
        div.innerHTML = `
            <div class="label-btns">
                <button class="l-edit" onclick="editLabel(this.parentElement.parentElement)">Edit</button>
                <button class="l-copy" onclick="copyLabel(this.parentElement.parentElement)">C</button>
                <button class="l-del" onclick="removeLabel(this.parentElement.parentElement)">X</button>
            </div>
            <div class="to-section">
                <div class="address-text">
                    <strong>To,</strong><br>
                    <span class="bold-data">${data.name}</span><br>
                    ${data.house}${data.house ? ',' : ''} ${data.po}<br>
                    ${data.loc}${data.loc ? ',' : ''} ${data.dist}<br>
                    ${data.state} - <strong>PIN: ${data.pin}</strong><br>
                    <strong>Mob: ${data.ph}</strong>
                </div>
                <div class="logo-container">
                    <img src="${LOGO_URL}" alt="Logo">
                </div>
            </div>
            <div class="from-section">
                <strong>From,</strong><br>
                <strong>SAIVANDANA KB</strong>, Kattany House, PO Kanjany,<br>
                Thrissur, Kerala - <strong>680612</strong>. MOB: <strong>9846797894</strong>
            </div>`;
        area.appendChild(div);
        count = document.querySelectorAll('.label').length;
        updateCounter();
    }

    function editLabel(el) {
        const id = parseInt(el.getAttribute('data-id'));
        const record = customers.find(c => c.id === id);
        if (record) {
            document.getElementById('custName').value = record.name;
            document.getElementById('house').value = record.house;
            document.getElementById('po').value = record.po;
            document.getElementById('location').value = record.loc;
            document.getElementById('district').value = record.dist;
            document.getElementById('state').value = record.state;
            document.getElementById('pincode').value = record.pin;
            document.getElementById('phone').value = record.ph;
            editId = id;
            document.getElementById('btnText').innerText = "Update Local";
            document.getElementById('mainBtn').style.background = "#f39c12";
            count--;
            updateCounter();
            window.scrollTo(0,0);
        }
    }

    function copyLabel(el) {
        const id = parseInt(el.getAttribute('data-id'));
        const record = customers.find(c => c.id === id);
        if (record) {
            const newData = {...record, id: Date.now()};
            customers.push(newData);
            addLabelToPrintArea(newData);
            saveToStorage();
        }
    }

    function removeLabel(el) { el.remove(); count = document.querySelectorAll('.label').length; updateCounter(); }
    function resetQueue() { if(confirm("Clear print queue?")) { document.getElementById('print-area').innerHTML = ''; count=0; updateCounter(); } }

    function renderHistory() {
        const body = document.getElementById('historyBody');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        body.innerHTML = '';
        const filtered = customers.filter(c => c.name.toLowerCase().includes(searchTerm) || c.ph.includes(searchTerm));
        document.getElementById('dataCount').innerText = `Total: ${customers.length}`;
        filtered.slice().reverse().forEach((c) => {
            const masterIndex = customers.findIndex(item => item.id === c.id);
            body.innerHTML += `
                <tr>
                    <td>${c.date}</td>
                    <td><strong>${c.name}</strong></td>
                    <td>${c.ph}</td>
                    <td><input type="text" class="tracking-input" value="${c.tracking}" onchange="updateRecord(${masterIndex}, 'tracking', this.value)"></td>
                    <td>
                        <select class="status-select" onchange="updateRecord(${masterIndex}, 'status', this.value)" style="background: ${getStatusColor(c.status)};">
                            <option ${c.status=='Pending'?'selected':''}>Pending</option>
                            <option ${c.status=='Shipped'?'selected':''}>Shipped</option>
                            <option ${c.status=='Delivered'?'selected':''}>Delivered</option>
                        </select>
                    </td>
                    <td><button style="background:#e74c3c; color:white; padding:4px 8px; border:none; border-radius:4px; cursor:pointer;" onclick="deleteFromMaster(${masterIndex})">Delete</button></td>
                </tr>`;
        });
    }

    function getStatusColor(status) { return status === 'Shipped' ? '#3498db' : (status === 'Delivered' ? '#27ae60' : '#f39c12'); }
    function updateRecord(idx, field, value) { customers[idx][field] = value; saveToStorage(); renderHistory(); }
    function deleteFromMaster(idx) { if(confirm("Delete from local?")) { customers.splice(idx, 1); saveToStorage(); renderHistory(); } }
    function saveToStorage() { localStorage.setItem('tanima_customers', JSON.stringify(customers)); }
    function clearInputs() { ['custName', 'house', 'po', 'location', 'district', 'state', 'pincode', 'phone', 'bulkPaste'].forEach(id => document.getElementById(id).value = ''); }
    function updateCounter() { document.getElementById('label-counter').innerText = `Labels in Queue: ${count} / 8`; }
    function clearAllData() { if(confirm("Wipe local data?")) { localStorage.clear(); customers = []; document.getElementById('print-area').innerHTML = ''; count=0; renderHistory(); updateCounter(); } }

    function exportToCSV() {
        if(customers.length === 0) return;
        let csv = "Date,Name,House,PO,Loc,District,State,Pin,Phone,Tracking,Status\n";
        customers.forEach(c => { csv += `"${c.date}","${c.name}","${c.house}","${c.po}","${c.loc}","${c.dist}","${c.state}","${c.pin}","${c.ph}","${c.tracking}","${c.status}"\n`; });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a'); a.href = window.URL.createObjectURL(blob); a.download = 'Tanima_Backup.csv'; a.click();
    }
</script>
</body>
</html>
